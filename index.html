<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <meta name="description" content="">
  <meta name="author" content="Tulisno">
  <link href="https://fonts.googleapis.com/css?family=Poppins:100,200,300,400,500,600,700,800,900&amp;display=swap" rel="stylesheet">
  <title>Tulisno | Web Auto Nulis Tugas</title>

  <link rel="stylesheet" type="text/css" href="assets/css/bootstrap.min.css">
  <link rel="stylesheet" type="text/css" href="assets/css/font-awesome.css">
  <link rel="stylesheet" href="assets/css/templatemo-lava.css">
  <link rel="stylesheet" href="assets/css/owl-carousel.css">

  <style>
    @font-face {
      font-family: HandwritingCR-2;
      src: url(/fonts/HandwritingCR-2.ttf);
    }

    /* Styling Kartu ala Proyek Nabin */
    .card-tulisno {
      background: #fff;
      border-radius: 20px;
      padding: 25px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      height: 100%;
      transition: all 0.3s;
      border: 1px solid #eee;
    }

    /* Penyesuaian untuk p5 Canvas */
    #canvas-holder {
      width: 100%;
      overflow-x: auto;
      background: #f8f9fa;
      border-radius: 10px;
      margin-bottom: 15px;
      display: flex;
      justify-content: center;
    }

    #defaultCanvas0 {
      max-width: 100%;
      height: auto !important;
    }

    @media only screen and (max-width: 991px) {
      /* Di HP, kita buat kartu Editor (Kartu 2) tampil paling atas jika diinginkan, 
         tapi di sini kita pakai auto-scroll saja biar alurnya tetap logis (1-2-3) */
      .welcome-area {
        margin-bottom: 50px;
      }
    }
  </style>
</head>

<body>

  <header class="header-area header-sticky background-header">
    <div class="container">
      <div class="row">
        <div class="col-12">
          <nav class="main-nav">
            <a href="index.html" class="logo">Tulisno</a>
            <ul class="nav">
              <li class="scroll-to-section"><a href="#welcome" class="menu-item">Home</a></li>
              <li class="scroll-to-section"><a href="#Tulisno" class="menu-item active">Tulisno</a></li>
              <li class="scroll-to-section"><a href="#contact-us" class="menu-item">Contact Us</a></li>
            </ul>
            <a class="menu-trigger"><span>Menu</span></a>
          </nav>
        </div>
      </div>
    </div>
  </header>

  <div class="welcome-area" id="welcome">
    <div class="header-text">
      <div class="container">
        <div class="row">
          <div class="left-text col-lg-6 col-md-12 col-sm-12 col-xs-12">
            <h1>Tulisno <em>.</em></h1>
            <p>Mager mau nulis offline? Mending pakai tulisno. Website nulis otomatis paling praktis!</p>
            <a href="#Tulisno" class="main-button-slider">Start Writing</a>
          </div>
        </div>
      </div>
    </div>
  </div>

  <section class="section" id="Tulisno">
    <div class="container-fluid" style="padding: 0 40px;">
      <div class="row">
        
        <div class="col-lg-4 col-md-12 mb-4">
          <div class="card-tulisno">
            <h5 class="mb-4"><i class="fa fa-cog"></i> 1. Pengaturan</h5>
            <div class="form-group">
              <label>Pilih Jenis Font:</label>
              <select class="form-control" id="font" onchange="localStorage.setItem('fontIndex', this.value); setup()"></select>
            </div>
            <div class="form-group">
              <label>Pilih Jenis Buku:</label>
              <select class="form-control" id="book" onchange="localStorage.setItem('bookIndex', this.value); setup()"></select>
            </div>
          </div>
        </div>

        <div id="editor-card" class="col-lg-4 col-md-12 mb-4">
          <div class="card-tulisno" style="border: 2px solid #f4813f;">
            <h5 class="mb-4"><i class="fa fa-edit"></i> 2. Editor Teks</h5>
            <div class="form-row">
              <div class="form-group col-md-6">
                <label>Hari/Tanggal</label>
                <input type="text" class="form-control" id="date" placeholder="Senin, ..." oninput="txtDate = this.value">
              </div>
              <div class="form-group col-md-6">
                <label>Nama</label>
                <input type="text" class="form-control" id="name" placeholder="Nama Anda" oninput="txtName = this.value">
              </div>
            </div>
            <div class="form-group">
              <label>Isi Tulisan</label>
              <textarea class="form-control" id="content" rows="12" placeholder="Tulis tugasmu di sini..." oninput="txtContent = this.value"></textarea>
            </div>
          </div>
        </div>

        <div class="col-lg-4 col-md-12 mb-4">
          <div class="card-tulisno text-center">
            <h5 class="mb-4"><i class="fa fa-eye"></i> 3. Preview</h5>
            <div id="canvas-holder">
              <main class="paper-container"></main>
            </div>
            <button class="main-button w-100" onclick="downloadCanvas(document.getElementById('defaultCanvas0'), 'hasil-tulisno.png')">
              <i class="fa fa-download"></i> Simpan Gambar
            </button>
          </div>
        </div>

      </div>
    </div>
  </section>

  <script src="https://cdn.jsdelivr.net/npm/p5@1.1.9/lib/p5.js"></script>
  <script>
    let bg, font, margin, gap, fontsize = 16;
    let txtDate = '', txtName = '', txtContent = '';

    let fonts = [
      {'index': 0, 'name': 'HandwritingCR 2', 'file': 'HandwritingCR-2.ttf'},
      {'index': 1, 'name': 'Gloria Hallelujah', 'file': 'GloriaHallelujah-Regular.ttf'},
      {'index': 2, 'name': 'Heart Warming', 'file': 'Heart Warming Font by Situjuh.otf'},
      {'index': 3, 'name': 'Shadows Into Light', 'file': 'ShadowsIntoLight-Regular.ttf'}
    ];

    let getFontIndex = () => {
      let fontIndex = localStorage.getItem('fontIndex');
      return fontIndex ? fonts[fontIndex] : fonts[0];
    }

    function setup() {
      let cnv = createCanvas(600, 894);
      cnv.parent('canvas-holder');
      bg = loadImage('/img/folio.jpg');
      font = loadFont('/fonts/' + getFontIndex().file);
      textFont(font);
      textSize(fontsize);
    }

    function draw() {
      background(bg);
      margin = 20;
      fill(0, 0, 0, 200);
      translate(margin - 8, margin * 4);
      text(txtName, 0, 0);
      text(txtDate, 450, 0);
      translate(0, margin + 7);
      text(txtContent, 0, 0, 580);
    }

    // Logika Auto-Scroll ke Editor di HP
    window.onload = function() {
      if (window.innerWidth < 992) {
        const editorCard = document.getElementById('editor-card');
        editorCard.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }
      
      // Load Select Options
      let fontSelectEl = document.getElementById('font');
      let _temp = '';
      fonts.forEach((f, idx) => {
        let selected = (idx == getFontIndex().index) ? 'selected' : '';
        _temp += `<option value="${idx}" ${selected}>${f.name}</option>`;
      });
      fontSelectEl.innerHTML = _temp;
    };

    function downloadCanvas(c, filename) {
      var lnk = document.createElement('a'), e;
      lnk.download = filename;
      lnk.href = c.toDataURL();
      if (document.createEvent) {
        e = document.createEvent("MouseEvents");
        e.initMouseEvent("click", true, true, window, 0, 0, 0, 0, 0, false, false, false, false, 0, null);
        lnk.dispatchEvent(e);
      } else {
        lnk.click();
      }
    }
  </script>

  <script src="assets/js/jquery-2.1.0.min.js"></script>
  <script src="assets/js/bootstrap.min.js"></script>
  <script src="assets/js/custom.js"></script>
</body>
</html>
